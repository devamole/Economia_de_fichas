<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Sin conexión — Fichas &amp; Premios</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0b;
      --fg: #fafaf9;
      --muted: #a1a1aa;
      --primary: #7c3aed;
      --primary-dark: #4f46e5;
      --card: #18181b;
      --border: #27272a;
      --radius: 0.75rem;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #fafaf9;
        --fg: #0a0a0b;
        --muted: #71717a;
        --card: #f5f5f4;
        --border: #e4e4e7;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      padding-bottom: max(1.5rem, env(safe-area-inset-bottom));
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) * 2);
      padding: 2.5rem 2rem;
      max-width: 360px;
      width: 100%;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .icon {
      font-size: 4rem;
      line-height: 1;
      filter: grayscale(0.2);
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    p {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.6;
      max-width: 280px;
    }

    button {
      margin-top: 0.5rem;
      padding: 0.75rem 1.75rem;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: opacity 0.15s;
    }

    button:active { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="card">
    <span class="icon">📡</span>
    <h1>Sin conexión</h1>
    <p>
      No hay conexión a internet. Las tareas completadas en modo offline
      se sincronizarán cuando vuelvas a conectarte.
    </p>
    <button onclick="window.location.reload()">Intentar de nuevo</button>
  </div>
</body>
</html>
